        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .nav-active { @apply bg-slate-800 text-white border-l-4 border-blue-500 shadow-inner; }
        .hide-scroll::-webkit-scrollbar { display: none; }

        #log-window {
            background-color: #0a0c10;
            background-image: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 2px, 3px 100%;
            text-shadow: 0 0 5px rgba(52, 211, 153, 0.3);

        .content-pane { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .device-tile { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .tile-active { @apply ring-2 ring-blue-500 border-blue-200 shadow-lg bg-blue-50/50 scale-[0.98]; }

        .details-footer { border-top: 1px solid #f1f5f9; margin-top: 12px; padding-top: 8px; position: relative; }
        .details-tooltip { visibility: hidden; position: absolute; bottom: 100%; left: 0; z-index: 50; background: #1e293b; color: white; padding: 12px; border-radius: 12px; font-size: 10px; width: 200px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); margin-bottom: 8px; }
        .details-footer:hover .details-tooltip { visibility: visible; }

        input:invalid:focus { @apply border-red-500 ring-1 ring-red-100; }
    </style>
</head>

    <script>
        let configSchema = { subnets: [] };
        let heroChart = null;
        let currentFontSize = 13;
        let allKnownHosts = [];

        async function handleLogin(e) {
            e.preventDefault();
            const user = document.getElementById('l-user').value;
            const pass = document.getElementById('l-pass').value;
            
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username: user, password: pass})
                });
                
                if (res.ok) {
                    document.getElementById('login-overlay').classList.add('hidden');
                    document.getElementById('l-pass').value = ''; // Clear for security
                    showToast("Access Granted");
                    init(); 
                } else {
                    showToast("Invalid Credentials", false);
                }
            } catch (err) {
                showToast("Server Connection Failed", false);
            }
        }

        // LOGOUT LOGIC
function handleLogout() {
    if(confirm("Confirm security log out?")) {
        // 1. Clear any local sensitive data
        document.getElementById('l-user').value = '';
        document.getElementById('l-pass').value = '';
        
        // 2. Hide all content panes and show login
        document.querySelectorAll('.content-pane').forEach(p => p.classList.add('hidden'));
        document.getElementById('login-overlay').classList.remove('hidden');
        
        // 3. Optional: Hard reload to clear JavaScript memory/variables
        // window.location.reload(); 
        
        showToast("Session Terminated");
    }
}
        async function refreshUserList() {
            try {
                const res = await fetch('/api/settings/list-users');
                const users = await res.json();
                const select = document.getElementById('s-target-user');
                select.innerHTML = '<option value="">Select User...</option>' + 
                    users.map(u => `<option value="${u}">${u}</option>`).join('');
            } catch (e) { console.error("Could not load users"); }
        }

        async function addAdmin() {
            const username = document.getElementById('s-new-user').value;
            const password = document.getElementById('s-new-pass').value;
            const res = await fetch('/api/settings/add-user', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username, password})
            });
            const data = await res.json();
            showToast(data.message, data.status === 'success');
            if(data.status === 'success') {
                document.getElementById('s-new-user').value = '';
                document.getElementById('s-new-pass').value = '';
                refreshUserList();
            }
        }

        async function updatePassword() {
            const username = document.getElementById('s-target-user').value;
            const password = document.getElementById('s-change-pass').value;
            if(!username) return showToast("Select a user first", false);
            
            const res = await fetch('/api/settings/update-password', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username, password})
            });
            const data = await res.json();
            showToast(data.message, data.status === 'success');
            if(data.status === 'success') document.getElementById('s-change-pass').value = '';
        }

        function showToast(message, isSuccess = true) {
            const toast = document.getElementById('toast');
            const toastBg = document.getElementById('toast-bg');
            const toastText = document.getElementById('toast-text');
            toastText.innerText = message;
            toastBg.className = isSuccess
                ? "bg-emerald-500 border-emerald-400 px-6 py-3 rounded-2xl shadow-2xl flex items-center space-x-3 border animate-bounce"
                : "bg-red-500 border-red-400 px-6 py-3 rounded-2xl shadow-2xl flex items-center space-x-3 border animate-bounce";
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 3500);
        }

        function switchTab(id, el) {
            document.querySelectorAll('.content-pane').forEach(p => p.classList.add('hidden'));
            document.getElementById('view-' + id).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('nav-active'));
            if(el) el.classList.add('nav-active');
            document.getElementById('view-title').innerText = id.replace('-', ' ');
            if(id === 'config') refreshHostnames();
            if(id === 'settings') refreshUserList();
            // Update the header logic here
            const titleElement = document.getElementById('view-title');
            if (id === 'tiles') {
               titleElement.innerText = 'CLIENTS'; // Changes TILES to CLIENTS
            } else if (id === 'logs') {
               titleElement.innerText = 'LIVE ACTIVITY';
            } else if (id === 'config') {
               titleElement.innerText = 'ADMIN';
            } else {
               titleElement.innerText = id.replace('-', ' ').toUpperCase();
            }

        }

        async function init() {
            const res = await fetch('/api/config-schema');
            configSchema = await res.json();
            const container = document.getElementById('subnet-container');
            container.innerHTML = '';

            configSchema.subnets.forEach(sub => {
                const btn = document.createElement('button');
                btn.className = "nav-item w-full text-left p-2 rounded hover:bg-slate-800 transition-all flex items-center group";
                btn.onclick = () => loadSubnet(sub, btn);
                btn.innerHTML = `
                    <svg class="w-4 h-4 mr-3 opacity-40 group-hover:text-blue-500 group-hover:opacity-100 transition-all flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                        <path d="M12 3a9 9 0 0 1 9 9 9 9 0 0 1-9 9 9 9 0 0 1-9-9 9 9 0 0 1 9-9Z" />
                        <path d="M12 15h8.4M12 9h8.4M12 3v18M12 3a15.3 15.3 0 0 1 4.5 9 15.3 15.3 0 0 1-4.5 9" />
                    </svg>
                    <div class="flex flex-col min-w-0">
                        <span class="text-[11px] text-slate-200 font-bold truncate">${sub.network}</span>
                        <span class="text-[8px] text-slate-500 font-mono tracking-tighter">${sub.range}</span>
                    </div>`;
                container.appendChild(btn);
            });
            const select = document.getElementById('f-target');
            select.innerHTML = '<option value="main">dhcpd.conf</option>';
            configSchema.includes.forEach(inc => select.innerHTML += `<option value="${inc}">${inc}</option>`);
        }

        async function refreshHostnames() {
            const res = await fetch('/api/data');
            const data = await res.json();
            allKnownHosts = data.hosts.sort((a, b) => {
                const nameA = (a.name || a.hostname || "").toLowerCase();
                const nameB = (b.name || b.hostname || "").toLowerCase();
                return nameA.localeCompare(nameB);
            });
            const list = document.getElementById('hostnames-list');
            list.innerHTML = allKnownHosts.map(h => `<option value="${h.name || h.hostname}">`).join('');
        }

        document.getElementById('f-name').addEventListener('input', function(e) {
            const val = e.target.value;
            const match = allKnownHosts.find(h => (h.name || h.hostname) === val);
            const badge = document.getElementById('f-status-badge');
            const targetSelect = document.getElementById('f-target');
            if (match) {
                document.getElementById('f-mac').value = match.mac || '';
                document.getElementById('f-ip').value = match.ip || '';
                badge.className = `absolute right-3 top-1/2 -translate-y-1/2 w-2.5 h-2.5 rounded-full transition-all ${match.status === 'online' ? 'bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.6)]' : 'bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.6)]'}`;
                if (match.source) {
                    const options = Array.from(targetSelect.options);
                    const targetOption = options.find(opt => opt.value === match.source || opt.text === match.source);
                    if (targetOption) targetSelect.value = targetOption.value;
                }
            } else { badge.className = "absolute right-3 top-1/2 -translate-y-1/2 w-2 h-2 rounded-full bg-slate-200"; }
        });

        async function loadSubnet(sub, navEl) {
            switchTab('tiles', navEl);
            const res = await fetch('/api/data');
            const data = await res.json();
            const grid = document.getElementById('tile-grid');
            grid.innerHTML = '';
            const startLimit = parseInt(sub.range.split(' - ')[0].split('.').pop());
            const endLimit = parseInt(sub.range.split(' - ')[1].split('.').pop());
            const filtered = data.hosts.filter(h => h.ip && h.ip.startsWith(sub.prefix) && (parseInt(h.ip.split('.').pop()) >= startLimit && parseInt(h.ip.split('.').pop()) <= endLimit));

            filtered.forEach((item, index) => {
                const color = item.status === 'online' ? 'bg-emerald-500' : 'bg-red-500';
                const div = document.createElement('div');
                div.className = "device-tile bg-white p-4 rounded-2xl border border-slate-200 shadow-sm cursor-pointer hover:border-blue-400 hover:shadow-md";
                div.onclick = () => updateHeroChart(item.ip, div);
                div.innerHTML = `
                    <div class="flex justify-between items-start mb-3">
                        <div class="text-[8px] font-black uppercase px-2 py-0.5 rounded shadow-sm ${item.source ? 'bg-blue-600 text-white' : 'bg-emerald-500 text-white'}">${item.source ? 'Static' : 'Lease'}</div>
                        <div class="h-2.5 w-2.5 ${color} rounded-full shadow-sm"></div>
                    </div>
                    <h3 class="font-extrabold text-slate-800 truncate text-[11px] mb-0.5">${item.name || item.hostname}</h3>
                    <div class="text-lg font-black text-slate-900 tracking-tighter leading-none">${item.ip}</div>
                    <p class="text-[9px] text-slate-400 mono mt-2 opacity-70 tracking-tighter">${item.mac.toUpperCase()}</p>
                    <div class="details-footer group/footer" onclick="event.stopPropagation(); openDetails('${item.mac}', '${item.name || item.hostname}')">
                        <div class="flex items-center justify-between opacity-30 hover:opacity-100 transition-opacity">
                            <span class="text-[8px] font-black uppercase tracking-tighter">Details</span>
                            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" stroke-width="2.5"/></svg>
                        </div>
                        <div id="hover-${item.mac.replace(/:/g,'')}" class="details-tooltip group-hover/footer:visible">Loading...</div>
                    </div>`;
                grid.appendChild(div);
                fetchDetailsForHover(item.mac);
                if(index === 0) updateHeroChart(item.ip, div);
            });
        }

        async function fetchDetailsForHover(mac) {
            const res = await fetch(`/api/get-details/${mac}`);
            const data = await res.json();
            const tip = document.getElementById(`hover-${mac.replace(/:/g,'')}`);
            if (data.description || data.admin_name || data.comments) {
                tip.innerHTML = `<div class="font-black border-b border-white/10 pb-1 mb-1 uppercase tracking-widest text-[8px]">${data.description || 'No Description'}</div>
                                 <div class="opacity-70 text-[9px]">Admin: ${data.admin_name || 'N/A'}</div>
                                 <div class="mt-1 line-clamp-2 text-slate-400">${data.comments || ''}</div>`;
            } else { tip.innerText = "Click to manage identity..."; }
        }

        async function openDetails(mac, hostname) {
            const res = await fetch(`/api/get-details/${mac}`);
            const data = await res.json();
            document.getElementById('det-mac').value = mac;
            document.getElementById('det-hostname').value = hostname;
            document.getElementById('det-desc').value = data.description || '';
            document.getElementById('det-admin').value = data.admin_name || '';
            document.getElementById('det-comm').value = data.comments || '';
            document.getElementById('details-modal').classList.remove('hidden');
        }

        function closeDetails() { document.getElementById('details-modal').classList.add('hidden'); }

        async function commitDetails() {
            const payload = {
                mac: document.getElementById('det-mac').value,
                description: document.getElementById('det-desc').value,
                admin_name: document.getElementById('det-admin').value,
                comments: document.getElementById('det-comm').value
            };
            await fetch('/api/save-details', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
            closeDetails();
            fetchDetailsForHover(payload.mac);
        }

        async function deleteHost() {
            const hostname = document.getElementById('det-hostname').value;
            if(!confirm(`Are you sure you want to delete ${hostname}?`)) return;
            const res = await fetch(`/api/delete-host/${hostname}`, { method: 'DELETE' });
            const data = await res.json();
            showToast(data.message, data.status === 'success');
            if(data.status === 'success') { closeDetails(); setTimeout(() => location.reload(), 1500); }
        }

        async function updateHeroChart(ip, tileEl) {
            document.getElementById('hero-graph-ip').innerText = ip;
            document.querySelectorAll('.device-tile').forEach(t => t.classList.remove('tile-active'));
            if(tileEl) tileEl.classList.add('tile-active');
            const res = await fetch(`/api/ping-history/${ip}`);
            const data = await res.json();
            const formattedData = data.map(d => (d.y > 0 ? d.y : null));
            const labels = data.map(d => new Date(d.x).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}));
            const ctx = document.getElementById('heroPingChart').getContext('2d');
            if (heroChart) heroChart.destroy();
            heroChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        data: formattedData,
                        borderColor: '#3b82f6', backgroundColor: 'rgba(59, 130, 246, 0.05)',
                        fill: true, tension: 0.4, pointRadius: 2, borderWidth: 2, spanGaps: false
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: false, suggestedMin: 1, ticks: { font: { size: 9, family: 'JetBrains Mono' } } },
                        x: { ticks: { font: { size: 9, family: 'JetBrains Mono' } } }
                    }
                }
            });
        }

        const wsProtocol = window.location.protocol === 'https:' ? 'wss://' : 'ws://';
        const logSocket = new WebSocket(wsProtocol + window.location.host + "/ws/logs");
        logSocket.onmessage = (e) => {
            const container = document.getElementById('log-content');
            const win = document.getElementById('log-window');
            const line = document.createElement('div');
            line.className = "log-line py-1.5 px-2 font-mono";
            let rawText = e.data;
            let formattedText = rawText;
            if (rawText.includes('DHCPREQUEST') || rawText.includes('DHCPACK')) { formattedText = `<span class="text-sky-300 font-bold">${rawText}</span>`; }
            else if (rawText.includes('DHCPDISCOVER')) { formattedText = `<span class="text-orange-300 font-bold">${rawText}</span>`; }
            else if (rawText.includes('DHCPINFORM')) { formattedText = `<span class="text-purple-300 font-bold">${rawText}</span>`; }
            else if (rawText.includes('DHCPRELEASE')) { formattedText = `<span class="text-red-400 font-bold">${rawText}</span>`; }
            line.innerHTML = `<span class="opacity-30 mr-2">$</span>` + formattedText;
            const f = document.getElementById('log-filter').value.toLowerCase();
            if (f && !rawText.toLowerCase().includes(f)) { line.style.display = 'none'; }
            container.appendChild(line);
            if (line.style.display !== 'none') { win.scrollTop = win.scrollHeight; }
        };

        function clearLogs() { document.getElementById('log-content').innerHTML = ''; }
        function adjustLogFont(d) { currentFontSize += d; document.getElementById('log-window').style.fontSize = currentFontSize + 'px'; }
        async function controlService(a) { await fetch(`/api/service/${a}`, { method: 'POST' }); }
        function applyLogFilter() {
            const f = document.getElementById('log-filter').value.toLowerCase();
            document.querySelectorAll('.log-line').forEach(l => l.style.display = l.innerText.toLowerCase().includes(f) ? 'block' : 'none');
        }

        async function saveHost() {
            const f_name = document.getElementById('f-name').value.trim();
            const f_mac = document.getElementById('f-mac').value.trim().toLowerCase();
            const f_ip = document.getElementById('f-ip').value.trim();
            const f_target = document.getElementById('f-target').value;
            if(!f_name || !f_mac || !f_ip) { showToast("All fields are required", false); return; }
            try {
                const payload = { hostname: f_name, mac: f_mac, ip: f_ip, target: f_target };
                const res = await fetch('/api/add-host', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
                const data = await res.json();
                if (data.status === 'success') { showToast(data.message, true); setTimeout(() => location.reload(), 2000); }
                else { showToast(data.message || "Error saving host", false); }
            } catch (error) { showToast("Network error: Server unreachable", false); }
        }

    </script>
</body>
</html>
